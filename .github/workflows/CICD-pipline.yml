
name: Auth Gateway CI/CD

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: api-gateway

jobs:

  test:
    name: Test & Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6.0.3

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/api-gateway/requirements.txt
          pip install ruff

      - name: Lint
        run: |
          ruff check . --fix

      - name: Run Tests
        working-directory: services/api-gateway
        run: |
          pytest \
            --junitxml=tests/test-results.xml \
            --cov=services/api-gateway/app \
            --cov-report=xml

      - name: Upload Test Reports
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports
          path: |
            services/api-gateway/tests/test-results.xml
            services/api-gateway/tests/coverage.xml

  docker-build:
    name: Build Docker Image
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Source
        uses: actions/checkout@v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0
      
      - name: Convert repository owner to lowercase
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Info
        run: | 
          docker version
          docker info

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api-gateway
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/api-gateway:${{ github.sha }}
            ghcr.io/${{ env.OWNER_LC }}/api-gateway:latest
                
          cache-from: type=gha
          cache-to: type=gha,mode=max
      